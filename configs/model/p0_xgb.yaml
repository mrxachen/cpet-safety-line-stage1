# P0 — XGBoost (primary ML model)
model_type: xgboost
task: binary_classification
target: p0_event

hyperparameters:
  n_estimators: [100, 300, 500]
  max_depth: [3, 5, 7]
  learning_rate: [0.01, 0.05, 0.1]
  subsample: [0.7, 0.9]
  colsample_bytree: [0.7, 0.9]
  min_child_weight: [1, 3]
  scale_pos_weight: auto  # handles class imbalance

cv:
  n_folds: 5
  scoring: roc_auc
  search_method: random  # random | grid | bayesian
  n_iter: 50

early_stopping:
  rounds: 20
  eval_metric: auc

calibration:
  method: isotonic
