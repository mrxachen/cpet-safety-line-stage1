# P1 — LightGBM (primary multiclass zone model)
model_type: lightgbm
task: multiclass
num_class: 3
target: p1_zone_ordinal

hyperparameters:
  n_estimators: [200, 500]
  max_depth: [4, 6, -1]
  learning_rate: [0.03, 0.05, 0.1]
  num_leaves: [31, 63]
  subsample: [0.8, 1.0]
  colsample_bytree: [0.7, 0.9]
  min_child_samples: [10, 20]
  class_weight: balanced

cv:
  n_folds: 5
  scoring: f1_macro
  search_method: random
  n_iter: 40

calibration:
  method: temperature_scaling
