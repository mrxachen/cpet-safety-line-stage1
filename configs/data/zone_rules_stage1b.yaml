version: "stage1b"

meta:
  name: "summary-level cpet laboratory phenotype prototype"
  description: "Phenotype burden + instability override + confidence engine"

variables:
  reserve:
    - field: vo2_peak
      direction: higher_better
      required: true
    - field: vo2_peak_pct_pred
      direction: higher_better
      required: false
    - field: vt1_vo2
      direction: higher_better
      required: false
    - field: at_vo2
      direction: higher_better
      required: false
    - field: o2_pulse_peak
      direction: higher_better
      required: false
    - field: mets_peak
      direction: higher_better
      required: false
    - field: hrr_1min
      direction: higher_better
      required: false

  ventilatory:
    - field: ve_vco2_slope
      direction: higher_worse
      required: true
    - field: oues
      direction: higher_better
      required: false

reference_model:
  covariates:
    numeric:
      - age
      - bmi
    categorical:
      - sex
      - protocol_mode
  quantiles: [0.10, 0.25, 0.50, 0.75, 0.90]
  age_spline_knots: 5
  min_reference_n: 100

burden_rules:
  higher_better:
    good_at_or_above: q25
    borderline_at_or_above: q10
    scores:
      good: 0.0
      borderline: 0.5
      poor: 1.0
  higher_worse:
    good_at_or_below: q75
    borderline_at_or_below: q90
    scores:
      good: 0.0
      borderline: 0.5
      poor: 1.0

domains:
  reserve:
    min_available: 2
  ventilatory:
    min_available: 1

phenotype:
  reserve_weight: 0.50
  ventilatory_weight: 0.50
  cutpoints_from_reference:
    low_pct: 75
    high_pct: 90

instability:
  severe:
    - field: eih_status
      op: eq
      value: true
    - field: bp_peak_sys
      op: gt
      value: 220
    - field: bp_peak_dia
      op: gt
      value: 110
    - field: o2_pulse_trajectory
      op: in
      value: ["下降", "晚期下降", "运动终止前下降", "持续平台", "晚期平台"]
  mild:
    - field: bp_peak_sys
      op: between_open_closed
      low: 200
      high: 220
    - field: effort_adequacy
      op: eq
      value: "uncertain"

confidence:
  weights:
    completeness: 0.25
    effort: 0.20
    anchor_agreement: 0.25
    validation_agreement: 0.30
    # 权重总和 = 1.00；较旧版减少 completeness（0.40→0.25），增加 anchor+validation 权重
  thresholds:
    high: 0.80
    medium: 0.65
  indeterminate_if_below: 0.65
  # 仅当 anchor_agreement 且 validation_agreement 同时均为中性值时，封顶为 medium（AND 逻辑）
  # 若至少一个域有真实值，允许达到 high
  cap_to_medium_if_neutral_agreement: true
