# =============================================================================
# CPET Stage I — Core Data Schema v1
# Defines field names, types, units, and ranges for summary-level CPET data
# =============================================================================
version: "1.0"
description: "Summary-level CPET data schema for older adults with cardiovascular disease"

# --------------- Identity & Demographics ---------------
identity:
  subject_id:
    dtype: string
    required: true
    description: "Anonymized subject identifier"
  session_id:
    dtype: string
    required: true
    description: "Test session identifier (subject_id + date hash)"
  test_date:
    dtype: date
    required: false
    description: "Date of CPET (YYYY-MM-DD)"

demographics:
  age:
    dtype: float
    unit: years
    range: [40, 100]
    required: true
  sex:
    dtype: category
    categories: [M, F]
    required: true
  height_cm:
    dtype: float
    unit: cm
    range: [140, 200]
  weight_kg:
    dtype: float
    unit: kg
    range: [30, 150]
  bmi:
    dtype: float
    unit: kg/m2
    range: [15, 50]

# --------------- Clinical Background ---------------
clinical:
  htn_history:
    dtype: bool
    description: "Hypertension diagnosis history"
    required: true
  cad_history:
    dtype: bool
    description: "Coronary artery disease history"
  hf_history:
    dtype: bool
    description: "Heart failure history"
  lvef_pct:
    dtype: float
    unit: "%"
    range: [10, 80]
    description: "Left ventricular ejection fraction"
  nyha_class:
    dtype: category
    categories: [1, 2, 3, 4]
    description: "NYHA functional classification"
  bp_rest_sys:
    dtype: float
    unit: mmHg
    range: [80, 220]
    description: "Resting systolic blood pressure"
  bp_rest_dia:
    dtype: float
    unit: mmHg
    range: [40, 130]
    description: "Resting diastolic blood pressure"

# --------------- CPET Resting Parameters ---------------
cpet_rest:
  hr_rest:
    dtype: float
    unit: bpm
    range: [30, 120]
    description: "Resting heart rate"
  vo2_rest:
    dtype: float
    unit: mL/kg/min
    range: [2, 8]
  vco2_rest:
    dtype: float
    unit: mL/kg/min

# --------------- CPET Peak Parameters (P0 inputs) ---------------
cpet_peak:
  vo2_peak:
    dtype: float
    unit: mL/kg/min
    range: [5, 60]
    required: true
    description: "Peak oxygen uptake"
  vo2_peak_pct_pred:
    dtype: float
    unit: "%"
    range: [10, 160]
    description: "VO2peak as % predicted"
  hr_peak:
    dtype: float
    unit: bpm
    range: [50, 220]
  hr_peak_pct_pred:
    dtype: float
    unit: "%"
  load_peak_w:
    dtype: float
    unit: W
    range: [0, 400]
  rer_peak:
    dtype: float
    range: [0.8, 1.5]
    description: "Peak respiratory exchange ratio (effort indicator)"
  o2_pulse_peak:
    dtype: float
    unit: mL/beat
    range: [2, 25]
  ve_vco2_slope:
    dtype: float
    range: [15, 60]
    description: "VE/VCO2 slope — ventilatory efficiency"
  bp_peak_sys:
    dtype: float
    unit: mmHg
    range: [80, 280]
  bp_peak_dia:
    dtype: float
    unit: mmHg

# --------------- CPET Threshold Parameters (P1 inputs) ---------------
cpet_threshold:
  vt1_vo2:
    dtype: float
    unit: mL/kg/min
    description: "VO2 at ventilatory threshold 1 (AT)"
  vt1_hr:
    dtype: float
    unit: bpm
    description: "Heart rate at VT1"
  vt1_load_w:
    dtype: float
    unit: W
    description: "Work rate at VT1"
  vt1_pct_vo2peak:
    dtype: float
    unit: "%"
    description: "VT1 as % of VO2peak"
  rcp_vo2:
    dtype: float
    unit: mL/kg/min
    description: "VO2 at respiratory compensation point (VT2/RCP)"
  rcp_hr:
    dtype: float
    unit: bpm
  rcp_load_w:
    dtype: float
    unit: W
  rcp_pct_vo2peak:
    dtype: float
    unit: "%"

# --------------- Instability / Safety Flags ---------------
cpet_safety:
  eih_status:
    dtype: bool
    description: "Exercise-induced hypoxemia (SpO2 drop ≥4% or <88%)"
  eih_nadir_spo2:
    dtype: float
    unit: "%"
    range: [70, 100]
  bp_response_abnormal:
    dtype: bool
    description: "Abnormal BP response (exaggerated or blunted)"
  st_depression_mm:
    dtype: float
    unit: mm
    description: "Peak ST depression (≥1mm = positive)"
  arrhythmia_flag:
    dtype: bool
    description: "Significant arrhythmia during test"
  test_terminated_early:
    dtype: bool
    description: "Test terminated before volitional exhaustion"
  termination_reason:
    dtype: string
    description: "Reason for early termination if applicable"

# --------------- Outcomes / Labels (to be generated by label_engine) ---------------
# These fields are NOT present in raw data; generated during labeling stage
labels:
  p0_event:
    dtype: bool
    description: "P0: adverse safety event proxy (generated)"
  p1_zone:
    dtype: category
    categories: [green, yellow, red]
    description: "P1: exercise safety zone classification (generated)"
  p1_zone_ordinal:
    dtype: int
    range: [0, 2]
    description: "P1 zone as ordinal integer (0=green, 1=yellow, 2=red)"
